# In-memory H2 database for E2E tests (no external Postgres/Supabase required)
spring.datasource.url=jdbc:h2:mem:e2edb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Use H2 dialect and create schema from entities; disable Flyway for E2E
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false
spring.jpa.hibernate.ddl-auto=create-drop

# Lower cap to make post-limit behavior testable in E2E.
boards.max-posts-per-board=3

# Keep E2E self-contained: disable external OTLP export (Grafana/localhost fallback).
management.tracing.enabled=false
management.otlp.metrics.export.enabled=false
management.opentelemetry.logging.export.enabled=false

