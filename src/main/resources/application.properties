spring.application.name=thankyouboard
spring.config.import=optional:classpath:application-secret.properties

# API versioning: strategy and supported versions are configured in AppConfig.java (WebMvcConfigurer).
# This property satisfies the vscode-spring-boot linter (API_VERSIONING_NOT_CONFIGURED).
spring.mvc.api-versioning.enabled=true

# Giphy API key for GIF search (server-side only). Set GIPHY_API_KEY env or giphy.api-key in application-secret.properties.
giphy.api-key=${GIPHY_API_KEY:}

# Cap enforced at board creation time.
boards.max-boards-per-owner=${BOARDS_MAX_BOARDS_PER_OWNER:100}

# Per-board post cap enforced at post creation time.
boards.max-posts-per-board=${BOARDS_MAX_POSTS_PER_BOARD:100}
# Allowed image hosts for post giphyUrl validation and PDF image rendering.
boards.images.allowed-hosts=${BOARDS_IMAGES_ALLOWED_HOSTS:giphy.com,*.giphy.com,giphyusercontent.com,*.giphyusercontent.com}
# PDF image fetch guardrails (timeout + byte caps).
boards.pdf.image-fetch-timeout=${BOARDS_PDF_IMAGE_FETCH_TIMEOUT:5s}
boards.pdf.max-image-bytes-per-image=${BOARDS_PDF_MAX_IMAGE_BYTES_PER_IMAGE:20971520}
boards.pdf.max-image-bytes-total=${BOARDS_PDF_MAX_IMAGE_BYTES_TOTAL:209715200}
# Local directory for async PDF job output (Spring Boot stack only).
boards.pdf.storage-dir=${BOARDS_PDF_STORAGE_DIR:${java.io.tmpdir}/pdf-exports}

# Auth0 (JWT validation for secured endpoints)
auth0.domain=${AUTH0_DOMAIN}
auth0.audience=${AUTH0_AUDIENCE}
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://${auth0.domain}/

# Database Configuration (override via SPRING_DATASOURCE_URL for hosted instances)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
# HikariCP: recycle connections before Supabase closes them (avoids "connection has been closed" on free tier)
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.keepalive-time=30000

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
logging.level.org.flywaydb=DEBUG

# Actuator: expose health only (for load balancers, K8s probes, CI)
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Grafana Configuration OTEL (OpenTelemetry)
grafana.api-key=${GRAFANA_API_KEY:}
grafana.url=${GRAFANA_URL:http://localhost:4318}
# Spring Boot management properties for OTLP (traces and metrics) — full paths required by Grafana Cloud
management.opentelemetry.tracing.export.otlp.endpoint=${grafana.url}/v1/traces
management.opentelemetry.tracing.export.otlp.headers.authorization=${grafana.otlp.headers:}
management.otlp.metrics.export.url=${grafana.url}/v1/metrics
management.otlp.metrics.export.headers.authorization=${grafana.otlp.headers:}
# OTLP logs export (used by Logback OTEL appender via OpenTelemetry SDK)
management.opentelemetry.logging.export.otlp.endpoint=${grafana.url}/v1/logs
management.opentelemetry.logging.export.otlp.headers.authorization=${grafana.otlp.headers:}
# Legacy OTEL env-style (optional; SDK may read these when set as env vars)
OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
OTEL_EXPORTER_OTLP_ENDPOINT=${grafana.url}